<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="hubGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <!-- Maskable safe zone: content within 40px margin -->
  <rect width="512" height="512" fill="url(#hubGradient)"/>
  <g fill="white">
    <!-- Central hub circle -->
    <circle cx="256" cy="256" r="54"/>
    <!-- Top game node -->
    <circle cx="256" cy="134" r="32"/>
    <rect x="250" y="134" width="12" height="68" rx="6"/>
    <!-- Right game node -->
    <circle cx="378" cy="256" r="32"/>
    <rect x="310" y="250" width="68" height="12" rx="6"/>
    <!-- Bottom game node -->
    <circle cx="256" cy="378" r="32"/>
    <rect x="250" y="310" width="12" height="68" rx="6"/>
    <!-- Left game node -->
    <circle cx="134" cy="256" r="32"/>
    <rect x="134" y="250" width="68" height="12" rx="6"/>
  </g>
</svg>
