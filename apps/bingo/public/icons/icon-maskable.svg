<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Maskable icons need safe zone padding (10% on each side) -->
  <rect width="512" height="512" fill="url(#ballGradient)"/>
  <circle cx="256" cy="256" r="160" fill="white"/>
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="140" font-weight="bold" text-anchor="middle" fill="#4f46e5">B</text>
</svg>
